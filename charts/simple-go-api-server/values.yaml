# Default values for simple-go-api-server
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

# Application hostname (override this for your app)
hostname: simple-go-api-server.arch.beescloud.com

image:
  repository: 189768267137.dkr.ecr.us-east-1.amazonaws.com/simple-go-api-server-image
  pullPolicy: Always
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
  hosts:
    - host: simple-go-api-server.arch.beescloud.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: simple-go-api-server-tls
      hosts:
        - simple-go-api-server.arch.beescloud.com

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

nodeSelector: {}

tolerations: []

affinity: {}
